[project]
name = "miniupnpd"
description = "an open-source UPnP daemon"

[build]
repo_url = "https://github.com/miniupnp/miniupnp.git"
repo_revision = "f83b5e2e21aa8dfa393ff80ea287ac4fca1a4df1"
workdir = "/opt/miniupnp"
build_dir = "miniupnpd"

apt_packages = ["libnftnl-dev", "libmnl-dev"]

commands = [
    "sh configure --leasefile --vendorcfg",
    "make -f Makefile.linux_nft CC=clang CFLAGS='-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined' LDFLAGS='-fsanitize=address,undefined' LDLIBS='-lnftnl -lmnl'",
]

[binaries]
# Pre-built, ASan/UBSan-instrumented binaries. Rendered into the audit prompt
# so the agent runs them directly instead of trying to rebuild the tree.
paths = [
    "/opt/miniupnp/miniupnpd/miniupnpd",
]
